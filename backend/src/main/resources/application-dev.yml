spring:
  datasource:
    # allowPublicKeyRetrieval=true 仅用于开发环境，避免 MySQL 8.0 连接问题
    # 生产环境必须使用 SSL 和证书认证
    url: jdbc:mysql://localhost:3306/syit_cpc_dev?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true

  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

logging:
  level:
    com.syit.cpc: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
