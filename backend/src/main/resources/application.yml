server:
  port: 8080
  tomcat:
    basedir: /Users/max/Desktop/coder——project/ustil/backend/tomcat-work

spring:
  application:
    name: syit-cpc

  web:
    resources:
      add-mappings: false

  mvc:
    throw-exception-if-no-handler-found: true

  datasource:
    url: jdbc:mysql://localhost:3306/syit_cpc?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:yy3908533}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath:/mapper/**/*.xml

jwt:
  secret: ${JWT_SECRET:ThisIsASecretKeyForJWTTokenGenerationMustBeAtLeast32CharactersLong}
  access-token-expiration: 86400000  # 24 hours in milliseconds
  refresh-token-expiration: 604800000  # 7 days in milliseconds

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.syit.cpc: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
